name: Windows MSIX (Microsoft Store)

# Manual trigger: publishes the self-contained WindowsDX app and packs it into an unsigned MSIX
# with the Store identity from EventHorizonRider.Windows/Package/AppxManifest.xml. Upload the
# resulting .msix to Partner Center (the Store re-signs it; no code-signing cert needed here).
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Package version a.b.c.d — MUST be higher than the current Store version"
        required: true
        default: "1.3.0.0"

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    env:
      WIN_PROJECT: EventHorizonRider.Windows/EventHorizonRider.Windows.csproj

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore the content tool
        run: dotnet tool restore

      - name: Publish the Windows app (self-contained x64)
        shell: bash
        run: |
          set -euo pipefail
          # -m:1 avoids the MonoGame content-pipeline ".mgstats" race (see CLAUDE.md).
          dotnet publish "$WIN_PROJECT" -c Release -r win-x64 --self-contained true \
            -p:PublishSingleFile=false -p:PublishReadyToRun=true -m:1 -o publish

      - name: Stage MSIX layout
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p staging
          cp -r publish/* staging/
          cp EventHorizonRider.Windows/Package/AppxManifest.xml staging/AppxManifest.xml
          cp -r EventHorizonRider.Windows/Package/Assets staging/Assets
          # Stamp the version into the manifest (placeholder 0.0.0.0).
          sed -i "s/0\.0\.0\.0/${{ inputs.version }}/" staging/AppxManifest.xml
          echo "Identity line:"; grep -n "Identity" staging/AppxManifest.xml
          test -f "staging/EventHorizonRider.Windows.exe" || { echo "::error::exe missing from publish output"; ls staging; exit 1; }

      - name: Pack MSIX
        shell: bash
        run: |
          set -euo pipefail
          MAKEAPPX=$(find "/c/Program Files (x86)/Windows Kits/10/bin" -name makeappx.exe -path '*x64*' 2>/dev/null | sort -V | tail -1)
          test -n "$MAKEAPPX" || { echo "::error::makeappx.exe not found"; exit 1; }
          echo "makeappx: $MAKEAPPX"
          mkdir -p out
          "$MAKEAPPX" pack /d staging /p "out/EventHorizonRider-${{ inputs.version }}.msix" /o
          ls -la out

      - name: Upload MSIX
        uses: actions/upload-artifact@v4
        with:
          name: windows-msix
          path: out/*.msix
          if-no-files-found: error

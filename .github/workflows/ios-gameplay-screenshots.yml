name: iOS Gameplay Screenshots (idb)

# Manual trigger: launches the game in an iPhone Simulator and uses idb to inject touches
# (tap START, then press-and-hold to steer) while firing a burst of screenshots, to capture
# mid-game and game-over (crash) scenes for the App Store. Validation pass: iPhone only.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gameplay:
    runs-on: macos-15
    env:
      IOS_PROJECT: EventHorizonRider.iOS/EventHorizonRider.iOS.csproj
      BUNDLE_ID: com.eventhorizonrider

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 26.3
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.3"

      - name: Pin .NET SDK
        run: |
          cat > global.json <<'JSON'
          { "sdk": { "version": "10.0.103", "rollForward": "disable" } }
          JSON

      - name: Restore tools and install the pinned iOS workload
        run: |
          dotnet tool restore
          cat > ios-rollback.json <<'JSON'
          { "microsoft.net.sdk.ios": "26.2.10233/10.0.100" }
          JSON
          dotnet workload install ios --from-rollback-file ios-rollback.json

      - name: Install Wine for MonoGame effect (.fx) compilation
        run: |
          set -euo pipefail
          softwareupdate --install-rosetta --agree-to-license || true
          brew install wget p7zip
          brew install --cask wine-stable
          sudo xattr -dr com.apple.quarantine "/Applications/Wine Stable.app" 2>/dev/null || true
          wget -qO- https://monogame.net/downloads/net9_mgfxc_wine_setup.sh | bash
          echo "MGFXC_WINE_PATH=$HOME/.winemonogame" >> "$GITHUB_ENV"

      - name: Install idb (touch injection)
        run: |
          set -euo pipefail
          export NONINTERACTIVE=1
          brew tap facebook/fb
          # Newer Homebrew refuses non-core taps until explicitly trusted.
          brew trust --formula facebook/fb/idb-companion || brew trust facebook/fb
          # fb-idb is unmaintained and uses asyncio.get_event_loop(), which RAISES on Python
          # 3.14 (the runner default). Install it into a Python 3.11 venv where that still works.
          brew install idb-companion python@3.11
          PY311="$(brew --prefix python@3.11)/bin/python3.11"
          "$PY311" -m venv "$HOME/idbvenv"
          "$HOME/idbvenv/bin/pip" install --quiet --upgrade pip
          "$HOME/idbvenv/bin/pip" install --quiet fb-idb
          echo "$HOME/idbvenv/bin" >> "$GITHUB_PATH"
          "$HOME/idbvenv/bin/idb" --help >/dev/null && echo "idb installed and runs"

      - name: Build the Simulator app
        run: |
          set -euo pipefail
          dotnet build "$IOS_PROJECT" -c Release -f net10.0-ios -r iossimulator-arm64 \
            -p:SharedTargetFrameworks=net10.0-ios -m:1
          APP=$(find EventHorizonRider.iOS/bin -type d -name '*.app' -path '*iossimulator*' | head -1)
          test -n "$APP" || { echo "::error::no simulator .app produced"; exit 1; }
          echo "APP=$APP" >> "$GITHUB_ENV"

      - name: Launch + drive the game + burst screenshots
        run: |
          set -uo pipefail
          mkdir -p shots
          UUID_RE='[0-9A-Fa-f]{8}-[0-9A-Fa-f]{4}-[0-9A-Fa-f]{4}-[0-9A-Fa-f]{4}-[0-9A-Fa-f]{12}'
          pick(){ xcrun simctl list devices available | grep -iE "$1" | grep -oE "$UUID_RE" | head -1; }
          UD=$(pick 'iPhone 16 Pro Max'); [ -z "$UD" ] && UD=$(pick 'iPhone 17 Pro Max'); [ -z "$UD" ] && UD=$(pick 'iPhone 16 Pro')
          test -n "$UD" || { echo "::error::no 6.9-inch iPhone simulator"; exit 1; }
          echo "Simulator: $UD"
          xcrun simctl bootstatus "$UD" -b
          xcrun simctl install "$UD" "$APP"

          echo "--- idb diagnostics ---"
          idb list-targets || true
          idb describe --udid "$UD" || echo "(idb describe failed)"

          # iPhone 16/17 Pro Max logical points (portrait): 440 x 956.
          # The game is landscape; in the portrait device space the landscape 'right' maps to
          # the bottom of the screen, so press-and-hold near bottom-center to steer.
          W=440; H=956; CX=$((W/2)); CY=$((H/2)); SX=$((W/2)); SY=$((H*82/100))

          xcrun simctl launch "$UD" "$BUNDLE_ID" || true
          sleep 10
          xcrun simctl io "$UD" screenshot shots/00-menu.png

          echo "Tap START at ($CX,$CY)"
          idb ui tap "$CX" "$CY" --udid "$UD" || echo "::warning::idb tap START failed"
          sleep 1.5
          xcrun simctl io "$UD" screenshot shots/01-after-start.png

          echo "Press-and-hold steer at ($SX,$SY) for 10s (background) + burst screenshots"
          idb ui tap "$SX" "$SY" --udid "$UD" --duration 10 &
          HOLD=$!
          for i in $(seq -w 1 16); do
            sleep 0.55
            xcrun simctl io "$UD" screenshot "shots/hold-$i.png" || true
          done
          wait $HOLD 2>/dev/null || true
          xcrun simctl io "$UD" screenshot shots/99-final.png
          echo "--- captured ---"; ls -la shots

      - name: Upload raw gameplay screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gameplay-screenshots-raw
          path: shots/
          if-no-files-found: warn

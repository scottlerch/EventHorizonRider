name: iOS Simulator Smoke Test

# Manual trigger: builds for the iOS Simulator, launches the app, and captures a screenshot.
# Confirms the app actually runs (no signing / TestFlight involved).
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    runs-on: macos-15
    env:
      IOS_PROJECT: EventHorizonRider.iOS/EventHorizonRider.iOS.csproj
      BUNDLE_ID: com.eventhorizonrider

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 26.3 (required by the iOS workload)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.3"

      - name: Pin .NET SDK (iOS workload compatible with the runner's Xcode)
        run: |
          cat > global.json <<'JSON'
          { "sdk": { "version": "10.0.103", "rollForward": "disable" } }
          JSON
          dotnet --version

      - name: Restore tools and install the pinned iOS workload
        run: |
          dotnet tool restore
          cat > ios-rollback.json <<'JSON'
          { "microsoft.net.sdk.ios": "26.2.10233/10.0.100" }
          JSON
          dotnet workload install ios --from-rollback-file ios-rollback.json

      # MonoGame compiles .fx shaders by running the HLSL compiler under Wine on macOS.
      - name: Install Wine for MonoGame effect (.fx) compilation
        run: |
          set -euo pipefail
          softwareupdate --install-rosetta --agree-to-license || true
          brew install wget p7zip
          brew install --cask wine-stable
          sudo xattr -dr com.apple.quarantine "/Applications/Wine Stable.app" 2>/dev/null || true
          wget -qO- https://monogame.net/downloads/net9_mgfxc_wine_setup.sh | bash
          echo "MGFXC_WINE_PATH=$HOME/.winemonogame" >> "$GITHUB_ENV"

      - name: Build for the iOS Simulator (no signing)
        run: |
          set -euo pipefail
          dotnet build "$IOS_PROJECT" -c Release -f net10.0-ios -r iossimulator-arm64 \
            -p:SharedTargetFrameworks=net10.0-ios -m:1
          APP=$(find EventHorizonRider.iOS/bin -type d -name '*.app' -path '*iossimulator*' | head -1)
          test -n "$APP" || { echo "::error::no simulator .app produced"; exit 1; }
          echo "APP=$APP" >> "$GITHUB_ENV"
          echo "Built $APP"

      - name: Boot simulator, install, launch, screenshot
        run: |
          set -euo pipefail
          UUID_RE='[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}'
          UDID=$(xcrun simctl list devices available | grep -iE 'iPhone (16|17) Pro' | grep -oE "$UUID_RE" | head -1)
          [ -z "$UDID" ] && UDID=$(xcrun simctl list devices available | grep -iE 'iPhone' | grep -oE "$UUID_RE" | head -1)
          test -n "$UDID" || { echo "::error::no iPhone simulator found"; exit 1; }
          echo "Simulator: $UDID"
          xcrun simctl bootstatus "$UDID" -b
          xcrun simctl install "$UDID" "$APP"
          # Launch with the console attached (backgrounded) so a startup crash/exception is
          # captured, screenshot while it runs, then detach. macOS has no `timeout`, so we
          # background the launch and kill it by PID rather than time-boxing it.
          xcrun simctl launch --console "$UDID" "$BUNDLE_ID" > app-console.log 2>&1 &
          LAUNCH_PID=$!
          sleep 12
          xcrun simctl io "$UDID" screenshot smoke-screenshot.png
          kill "$LAUNCH_PID" 2>/dev/null || true
          echo "=== app console (first 80 lines) ==="
          head -80 app-console.log || true
          mkdir -p crash-logs
          cp "$HOME/Library/Logs/DiagnosticReports/"*EventHorizon*.ips crash-logs/ 2>/dev/null || true

      - name: Upload screenshot + logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: simulator-smoke
          path: |
            smoke-screenshot.png
            app-console.log
            crash-logs/
          if-no-files-found: warn
